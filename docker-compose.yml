services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-ecommerce}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod # ← Изменено с prod-distroless на prod
    container_name: ecommerce-api
    restart: unless-stopped
    ports:
      - '${API_PORT:-8080}:3000'
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-ecommerce}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY}
      PORT: 3000
    networks:
      - internal
      - public
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: prod
    container_name: ecommerce-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3000
    networks:
      - public
      - internal
    depends_on:
      - api

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: ecommerce-migrate
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-ecommerce}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: seed
    container_name: ecommerce-seed
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-ecommerce}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

volumes:
  pgdata:
    driver: local
