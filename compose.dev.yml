services:
  api:
    build:
      target: dev
    container_name: ecommerce-api-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
    volumes:
      - ./apps/backend/src:/app/apps/backend/src:cached
      - ./apps/backend/tsconfig.json:/app/apps/backend/tsconfig.json:cached
      - ./apps/backend/nest-cli.json:/app/apps/backend/nest-cli.json:cached
      - /app/node_modules
      - /app/apps/backend/node_modules
    command: npm run start:dev
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: dev
    container_name: ecommerce-frontend-dev
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://api:3000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./apps/frontend:/app:cached
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - api
    networks:
      - public
      - internal

  postgres:
    ports:
      - "5432:5432"