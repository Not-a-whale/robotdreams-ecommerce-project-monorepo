services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-ecommerce}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ecommerce-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin}
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    container_name: ecommerce-api
    restart: unless-stopped
    ports:
      - '${API_PORT:-8080}:3000'
    env_file:
      - ./apps/backend/.env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-ecommerce}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672
      WORKER_MODE: 'false'
      PORT: 3000
    networks:
      - internal
      - public
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: ecommerce-worker
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-ecommerce}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672
      WORKER_MODE: 'true'
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: prod
    container_name: ecommerce-frontend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      BACKEND_URL: http://api:3000
      NEXT_PUBLIC_API_URL: http://localhost:8080
    networks:
      - public
    depends_on:
      - api

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: ecommerce-migrate
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-ecommerce}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: seed
    container_name: ecommerce-seed
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-ecommerce}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

volumes:
  pgdata:
    driver: local
  rabbitmq_data:
    driver: local
